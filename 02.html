<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>02 - Getting Rich vs Staying Rich</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f1ea;
      --frame: #ffffff;
      --shadow: 0 24px 70px rgba(22, 36, 64, 0.14);
    }
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(202, 152, 42, 0.08), transparent 36%),
        radial-gradient(circle at bottom right, rgba(18, 42, 78, 0.06), transparent 40%),
        var(--bg);
      font-family: "Segoe UI", Arial, sans-serif;
    }
    body {
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .page {
      width: min(100%, 1280px);
      background: var(--frame);
      box-shadow: var(--shadow);
      border-radius: 18px;
      padding: 18px;
      box-sizing: border-box;
    }
    img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 12px;
    }
    @media (max-width: 768px) {
      body { padding: 10px; }
      .page { padding: 10px; border-radius: 14px; }
      img { border-radius: 10px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <img src="ChatGPT%20Image%202026%E5%B9%B44%E6%9C%8825%E6%97%A5%2010_01_43.png" alt="02 - Getting Rich vs Staying Rich" />
  </main>
</body>
</html>
